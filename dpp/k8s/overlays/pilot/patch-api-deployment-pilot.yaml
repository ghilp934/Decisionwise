apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpp-api
spec:
  template:
    spec:
      containers:
      - name: dpp-api
        # Image Pin Policy (Option B: digest) -- tag drift 방지
        # 변경 시: aws ecr describe-images --repository-name dpp-api --image-ids imageTag=<tag>
        image: 783268398937.dkr.ecr.ap-northeast-2.amazonaws.com/dpp-api@sha256:6b89dea324625d34b7345c24a4115f63d08aafefffa5fef992d631a3dbd65a5e
        env:
        - name: DP_ENV
          value: "pilot"
        - name: API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: dpp-config
              key: API_BASE_URL
        - name: CHECKOUT_SITE_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: dpp-config
              key: CHECKOUT_SITE_BASE_URL
        - name: PAYPAL_SANDBOX_SKIP_SIG_VERIFY
          valueFrom:
            configMapKeyRef:
              name: dpp-config
              key: PAYPAL_SANDBOX_SKIP_SIG_VERIFY
        - name: TOKEN_PEPPER_V1
          valueFrom:
            secretKeyRef:
              name: dpp-secrets
              key: token-pepper-v1
        - name: KILL_SWITCH_AUDIT_BUCKET
          value: "dpp-evidence-worm-783268398937"
        # Phase 4 follow-up (Option 1): pilot runs the SAME startup PayPal active preflight as
        # production. REQUIRED=1 → fail-fast RuntimeError if PayPal credential check fails.
        # This ensures pilot cannot boot with invalid PayPal secrets, matching prod behaviour.
        - name: DPP_BILLING_PREFLIGHT_REQUIRED
          value: "1"
        # Phase 4: Toss secrets removed from SecretProviderClass for v1.0 PayPal-only beta.
        # Override base secretKeyRef entries with empty literals so Pod env injection succeeds
        # even though dpp-secrets no longer contains toss-secret-key / toss-webhook-secret.
        # Toss webhook handler reads TOSS_WEBHOOK_SECRET at runtime and skips signature
        # verification when the value is empty (existing behaviour — no code change needed).
        - name: TOSS_SECRET_KEY
          value: ""
        - name: TOSS_WEBHOOK_SECRET
          value: ""
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 20
          failureThreshold: 3
