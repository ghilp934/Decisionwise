apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 🔴 PRODUCTION ACK=1 오버레이
#
# ──────────────────────────────────────────────────────────────────────────
# STOP: 이 오버레이를 적용하기 전에 아래를 확인하세요.
#
#   ops/runbooks/db_backup_restore.md 체크리스트 전 항목 완료 필수:
#     [ ] db_backup_pgdump.sh 백업 생성 테스트
#     [ ] db_restore_verify.sh 복원 리허설 (테스트 환경)
#     [ ] 백업 자동화(cron/CronJob) 구성 완료
#     [ ] 백업 보관 위치(S3 등) 확정
#     [ ] 복원 담당자 공유 완료
#
# 완료 후 적용:
#   kubectl apply -k k8s/overlays/production-ack1
#   kubectl rollout restart -n dpp-production deploy/dpp-api
# ──────────────────────────────────────────────────────────────────────────
#
# 설계: production 오버레이를 base로 사용 (overlay chaining)
#   production-ack1 = production 전체 + ACK=1 패치 2개
#   → 공통 production 설정은 중복 없이 ../production 에서 상속

namespace: dpp-production

resources:
  - ../production

patches:
  # [1/2] ConfigMap: DPP_ACK_SUPABASE_BACKUP_POLICY="1" 키 추가
  - path: patch-configmap-production-ack1.yaml
    target:
      kind: ConfigMap
      name: dpp-config

  # [2/2] Deployment: DPP_ACK_SUPABASE_BACKUP_POLICY env 참조 추가
  #   → ConfigMap 키만 추가해도 파드에 자동 주입되지 않음.
  #   → Deployment env 섹션에도 configMapKeyRef 가 있어야 파드가 env를 읽음.
  - path: patch-api-deployment-production-ack1.yaml
    target:
      kind: Deployment
      name: dpp-api

labels:
  - pairs:
      environment: production
    includeSelectors: false
